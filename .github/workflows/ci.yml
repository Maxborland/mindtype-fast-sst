name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rust tests
  rust-test:
    name: Rust Tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mindtype-rust

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mindtype-rust

      - name: Run tests
        run: cargo test --workspace

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  # Frontend tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mindtype-rust/crates/mindtype-tauri/src-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mindtype-rust/crates/mindtype-tauri/src-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Run E2E tests
        run: npm run test:e2e

  # Type checking and linting
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mindtype-rust/crates/mindtype-tauri/src-ui

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mindtype-rust/crates/mindtype-tauri/src-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Svelte check
        run: npm run check
