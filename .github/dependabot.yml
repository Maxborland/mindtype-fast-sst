version: 2
updates:
  # Rust dependencies
  - package-ecosystem: "cargo"
    directory: "/mindtype-rust"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"

  # NPM dependencies for Tauri frontend
  - package-ecosystem: "npm"
    directory: "/mindtype-rust/crates/mindtype-tauri/src-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
